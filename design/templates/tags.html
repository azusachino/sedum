<!-- ============================================================================
  tags.html — GET /tags  and  GET /tags/:tag.
  Tag cloud sized by count (tb_tags); selecting a tag lists its pages.
  ============================================================================ -->
<div class="sd-view sd-page">
  <h1>Browse by tag</h1>
  <p class="sub">Every tag across your workspace, sized by how often it shows up.</p>

  <div class="sd-tagcloud">
    {{# for t in tags }}
      <!-- scale font + padding by frequency; clamp in the handler -->
      <a class="sd-tagpill" href="/tags/{{ t.name }}"
         style="font-size: calc(13px + {{ t.count }}px); padding: calc(8px + {{ t.weight }}px) calc(14px + {{ t.count }}px)">
        #{{ t.name }} <span>{{ t.count }}</span>
      </a>
    {{# endfor }}
  </div>

  {{# if selected_tag }}
    <div style="font-size:11px;font-weight:800;letter-spacing:1.2px;color:var(--muted);margin-bottom:14px">
      TAGGED <span style="color:var(--teal)">#{{ selected_tag }}</span> · {{ pages.len }} PAGES
    </div>
    <div class="sd-grid2">
      {{# for p in pages }}
        <a class="sd-pagecard" href="/page/{{ p.name }}">
          <span class="ttl">{{ p.title }}</span>
          <span class="desc">{{ p.excerpt }}</span>
        </a>
      {{# endfor }}
    </div>
  {{# endif }}
</div>
