<!-- ============================================================================
  page_edit.html — edit mode. Served at  GET /page/:name/edit.
  Classic wiki model: a <form> POSTing raw Markdown back to /page/:name, which
  saves atomically and 303-redirects to the readonly view.

  IMPORTANT (architecture fit): the right "LIVE PREVIEW" pane is shown here for
  visual parity with the design, but true keystroke-live preview is ROADMAP
  (pairs with CodeMirror 6 — see docs/architecture.md "Out of scope"). Until
  then, pick ONE of:
    (a) Ship single-pane: drop the .sd-preview pane, let the textarea fill width.
    (b) Server preview: a "Preview" submit button that re-renders via comrak and
        repaints the right pane on POST (no client JS, classic round-trip).
  Do NOT add MDX/JSX or a client Markdown lib — explicitly rejected in the repo.
  ============================================================================ -->
<form class="sd-edit" method="post" action="/page/{{ name }}">
  <div class="sd-edit-toolbar">
    <span class="sd-editing"><i></i>Editing</span>
    <span class="sd-pathchip">{{ rel_path }}</span>
    <div class="sd-fmt" aria-hidden="true">
      <button type="button">B</button>
      <button type="button" style="font-style:italic">I</button>
      <button type="button" style="font-size:11px">H1</button>
      <button type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"></path><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"></path></svg></button>
    </div>
    <div class="sd-edit-actions">
      <a class="sd-btn sd-btn-ghost" href="/page/{{ name }}">Cancel</a>
      <button class="sd-btn sd-btn-primary" type="submit">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M17 21v-8H7v8M7 3v5h8"></path></svg>
        Save
      </button>
    </div>
  </div>

  <div class="sd-edit-split">
    <div class="sd-edit-pane">
      <div class="sd-pane-label">MARKDOWN SOURCE</div>
      <textarea class="sd-textarea" name="body" spellcheck="false">{{ raw_markdown }}</textarea>
    </div>
    <!-- Option (b): server-rendered preview pane. Remove for option (a). -->
    <div class="sd-edit-pane">
      <div class="sd-pane-label live"><i></i>PREVIEW</div>
      <div class="sd-preview sd-prose">{{ rendered_html | safe }}</div>
    </div>
  </div>
</form>
