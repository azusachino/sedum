<!-- ============================================================================
  new_page.html — create-page flow + onboarding empty state.

  Two ways to ship it, both honor the no-bundler rule:

  A) MODAL (matches the prototype): render this inside _shell.html over the
     current page. miku.js live-slugs the path (data-create-title /
     data-folder / data-create-path) with zero framework. Submit POSTs to /new.

  B) PLAIN PAGE: serve at GET /new as its own server-rendered page (no JS at
     all — the live path just updates on submit). Recommended if you want the
     create flow to work with JS disabled.

  POST /new  -> server slugifies title, writes miku/<folder><slug>.md from the
  chosen template, then 303-redirects to /page/<name> which shows the
  onboarding empty state below (until the page has content).
  ============================================================================ -->

<!-- ---------- CREATE DIALOG ---------- -->
<div class="sd-overlay top">
  <form class="sd-modal create" method="post" action="/new">
    <div class="sd-modal-bar"></div>
    <div class="sd-modal-body">
      <div class="sd-card-label" style="display:flex;align-items:center;gap:7px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        NEW PAGE
      </div>
      <input class="sd-create-title" name="title" data-create-title placeholder="Untitled page" autofocus autocomplete="off">
      <div class="sd-create-path">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        <span data-create-path>untitled-page.md</span>
      </div>

      <div class="sd-card-label" style="margin:22px 0 9px">LOCATION</div>
      <input type="hidden" name="folder" value="">  <!-- set from chips server-side or via tiny JS -->
      <div class="sd-choice">
        <button class="sd-chip is-active" type="button" data-folder="">Workspace</button>
        <button class="sd-chip" type="button" data-folder="guides/">Guides</button>
        <button class="sd-chip" type="button" data-folder="projects/">Projects</button>
      </div>

      <div class="sd-card-label" style="margin:20px 0 9px">START FROM</div>
      <div class="sd-tplgrid">
        <label class="sd-tpl is-active"><input type="radio" name="template" value="blank" checked hidden>
          <span class="ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"></path><path d="M14 3v5h5"></path></svg></span>
          <span><span style="display:block;font-size:13.5px;font-weight:800;color:var(--text)">Blank page</span><span style="font-size:11.5px;color:var(--muted);font-weight:600">Empty canvas</span></span>
        </label>
        <label class="sd-tpl"><input type="radio" name="template" value="meeting" hidden>
          <span class="ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg></span>
          <span><span style="display:block;font-size:13.5px;font-weight:800;color:var(--text)">Meeting notes</span><span style="font-size:11.5px;color:var(--muted);font-weight:600">Agenda + actions</span></span>
        </label>
        <label class="sd-tpl"><input type="radio" name="template" value="reading" hidden>
          <span class="ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></span>
          <span><span style="display:block;font-size:13.5px;font-weight:800;color:var(--text)">Reading list</span><span style="font-size:11.5px;color:var(--muted);font-weight:600">Links to revisit</span></span>
        </label>
        <label class="sd-tpl"><input type="radio" name="template" value="project" hidden>
          <span class="ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17V7l8 5z"></path><path d="M3 3v18h18"></path></svg></span>
          <span><span style="display:block;font-size:13.5px;font-weight:800;color:var(--text)">Project plan</span><span style="font-size:11.5px;color:var(--muted);font-weight:600">Goals + milestones</span></span>
        </label>
      </div>
    </div>
    <div class="sd-modal-foot">
      <span style="font-size:12px;font-weight:600;color:var(--muted)">Press <span class="sd-kbd" style="color:var(--text)">Enter</span> to create</span>
      <div style="margin-left:auto;display:flex;gap:9px">
        <a class="sd-btn sd-btn-ghost" href="javascript:history.back()" style="height:42px">Cancel</a>
        <button class="sd-btn sd-btn-primary" type="submit" style="height:42px">Create page</button>
      </div>
    </div>
  </form>
</div>

<!-- ---------- ONBOARDING EMPTY STATE (render at /page/:name when body is empty) ----------
<div class="sd-view sd-empty">
  <div class="badge"><span class="eqbars"><i></i><i></i><i></i><i></i></span></div>
  <h1>{{ title }}</h1>
  <div class="sd-create-path" style="padding:5px 12px;border-radius:9px;background:var(--panel);border:1px solid var(--border);margin-bottom:18px">
    <span class="sd-synced"><i></i></span> {{ rel_path }} · created just now
  </div>
  <p class="sub">Your <strong style="color:var(--text)">{{ template_label }}</strong> page is ready. Jump in and start writing.</p>
  <div style="display:flex;gap:12px">
    <a class="sd-btn sd-btn-primary" href="/page/{{ name }}/edit">Start writing</a>
    <a class="sd-btn sd-btn-ghost" href="/import">Import Markdown</a>
  </div>
</div>
-->
