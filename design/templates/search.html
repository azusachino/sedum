<!-- ============================================================================
  search.html — GET /search?q=...  (server-rendered FTS results).
  Backed by tb_pages.body_tsv (see docs/architecture.md). Goes into {{ content }}.
  ============================================================================ -->
<div class="sd-view sd-page">
  <h1>Search</h1>
  <p class="sub"><strong class="teal">{{ result_count }}</strong> results for <strong style="color:var(--text)">"{{ q }}"</strong></p>

  <!-- inline search form (GET keeps it server-rendered + shareable URLs) -->
  <form method="get" action="/search" class="sd-search-field" style="max-width:560px;margin-bottom:24px">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
    <input name="q" value="{{ q }}" placeholder="Type to search…" autofocus>
  </form>

  {{# for r in results }}
    <a class="sd-result" href="/page/{{ r.name }}">
      <div class="head">
        <span class="ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"></path><path d="M14 3v5h5"></path></svg></span>
        <span class="ttl">{{ r.title }}</span>
        <span class="path">{{ r.rel_path }}</span>
      </div>
      <!-- ts_headline() snippet; wrap matches in <mark> server-side -->
      <div class="snip">{{ r.snippet | safe }}</div>
    </a>
  {{# endfor }}

  {{# if result_count == 0 }}
    <p class="sub">No pages match yet. Try a different term, or <a href="/new">create a page</a>.</p>
  {{# endif }}
</div>
