{% extends "base.html" %}

{% block title %}
Miku - Edit {{ path }}
{% endblock %}

{% block content %}
<form action="/p/{{ path }}" method="POST" class="mk-edit flex flex-col h-full overflow-hidden" data-editor
      x-data="{ 
          viewMode: 'split',
          wrapSelection(marker, fallback) { window.editorWrapSelection(marker, fallback) },
          prefixLine(prefix) { window.editorPrefixLine(prefix) }
      }">
    <input type="hidden" name="loaded_hash" value="{{ loaded_hash }}">

    <header class="mk-edit-toolbar flex items-center justify-between gap-5 px-6 py-3 border-b border-border bg-topbar backdrop-blur-[22px] flex-shrink-0">
        <div class="mk-editing flex items-center gap-2 text-xs font-bold text-pink select-none">
            <span class="animate-pulse">●</span> Editing
        </div>
        <span class="mk-pathchip hidden md:inline font-mono text-[11px] bg-panel border border-border px-2 py-0.75 rounded-md text-muted truncate max-w-[200px]">miku/{{ path }}.md</span>

        <!-- View Mode Switcher -->
        <div class="flex items-center bg-panel/30 border border-border/25 rounded-lg p-0.5 text-xs font-semibold gap-0.5">
            <button type="button" class="px-2.5 py-1 rounded-md transition" :class="viewMode === 'source' ? 'bg-teal text-white shadow-sm' : 'text-muted hover:text-text-base'" @click="viewMode = 'source'">Editor</button>
            <button type="button" class="px-2.5 py-1 rounded-md transition" :class="viewMode === 'split' ? 'bg-teal text-white shadow-sm' : 'text-muted hover:text-text-base'" @click="viewMode = 'split'">Split</button>
            <button type="button" class="px-2.5 py-1 rounded-md transition" :class="viewMode === 'preview' ? 'bg-teal text-white shadow-sm' : 'text-muted hover:text-text-base'" @click="viewMode = 'preview'">Preview</button>
        </div>

        <div class="mk-fmt flex items-center gap-1 border border-border/25 rounded-lg bg-panel/30 p-0.5 text-xs font-bold text-muted" aria-label="Formatting helpers">
            <button type="button" class="px-2.5 py-1 hover:text-text-base rounded transition" @click="wrapSelection('**', 'bold text')" title="Bold">B</button>
            <button type="button" class="px-2.5 py-1 hover:text-text-base rounded transition" @click="wrapSelection('*', 'italic text')" title="Italic">I</button>
            <button type="button" class="px-2.5 py-1 hover:text-text-base rounded transition" @click="prefixLine('# ')" title="Heading 1">H1</button>
            <button type="button" class="px-2.5 py-1 hover:text-text-base rounded transition" @click="wrapSelection('[', '](url)')" title="Link">[]</button>
        </div>

        <div class="mk-edit-actions flex items-center gap-2.5">
            <a href="/p/{{ path }}" class="mk-btn mk-btn-ghost">Cancel</a>
            <button type="submit" class="mk-btn mk-btn-primary">Save</button>
        </div>
    </header>

    <div class="mk-edit-title-container px-6 py-4 border-b border-border/15 bg-panel/10 flex items-center gap-3">
        <span class="text-teal/80 text-2xl select-none" aria-hidden="true">📄</span>
        <input
            type="text"
            id="edit-title-input"
            class="w-full bg-transparent border-none outline-none font-bold text-2xl text-text-base placeholder:text-muted/40"
            placeholder="type note's title here..."
            aria-label="Note Title"
        >
    </div>

    <div class="mk-edit-split flex flex-1 min-h-0 divide-x divide-border/10">
        <section class="mk-edit-pane flex flex-col flex-1 min-h-0" x-show="viewMode === 'source' || viewMode === 'split'">
            <div id="source-label" class="mk-pane-label px-4 py-2 text-[10px] font-bold text-muted/65 tracking-wider uppercase border-b border-border/10">MARKDOWN SOURCE</div>
            <!-- CodeMirror container -->
            <div id="editor-container" class="flex-1 min-h-0"></div>
            <!-- Hidden textarea for form submit -->
            <textarea
                id="body-textarea"
                class="hidden"
                name="body"
            >{{ body }}</textarea>
        </section>

        <section class="mk-edit-pane flex flex-col flex-1 min-h-0" x-show="viewMode === 'preview' || viewMode === 'split'">
            <div id="preview-label" class="mk-pane-label live px-4 py-2 text-[10px] font-bold text-muted/65 tracking-wider uppercase border-b border-border/10 flex items-center gap-1.5">
                <span class="text-teal">●</span> LIVE PREVIEW
            </div>
            <div class="mk-preview mk-prose p-6 overflow-y-auto flex-1 min-h-0" data-preview></div>
        </section>
    </div>
</form>

<script type="module">
    import { EditorState } from "https://esm.sh/@codemirror/state";
    import { EditorView, basicSetup } from "https://esm.sh/codemirror";
    import { markdown } from "https://esm.sh/@codemirror/lang-markdown";

    (function() {
        const editor = document.querySelector('[data-editor]');
        if (!editor) return;

        const textarea = editor.querySelector('#body-textarea');
        const preview = editor.querySelector('[data-preview]');
        const titleInput = editor.querySelector('#edit-title-input');
        let timer = null;
        let requestId = 0;

        const frontmatterRegex = /^---\r?\n([\s\S]*?)\r?\n---\r?\n?/;

        function getTitleAndBody(raw) {
            const match = raw.match(frontmatterRegex);
            let title = '';
            let frontmatterContent = '';
            let bodyText = raw;

            if (match) {
                frontmatterContent = match[1];
                bodyText = raw.slice(match[0].length);
                const titleMatch = frontmatterContent.match(/^title:\s*(.*)$/m);
                if (titleMatch) {
                    title = titleMatch[1].replace(/^["']|["']$/g, '').trim();
                }
            }
            return { title, frontmatterContent, bodyText };
        }

        function updateFrontmatterTitle(raw, newTitle) {
            const match = raw.match(frontmatterRegex);
            if (match) {
                const fm = match[1];
                const titleMatch = fm.match(/^title:\s*(.*)$/m);
                let newFm;
                if (titleMatch) {
                    newFm = fm.replace(/^title:\s*.*$/m, `title: "${newTitle.replace(/"/g, '\\"')}"`);
                } else {
                    newFm = `title: "${newTitle.replace(/"/g, '\\"')}"\n` + fm;
                }
                return `---\n${newFm.trim()}\n---\n` + raw.slice(match[0].length);
            } else {
                return `---\ntitle: "${newTitle.replace(/"/g, '\\"')}"\n---\n\n` + raw;
            }
        }

        // Initialize CodeMirror 6 Custom Theme
        const myTheme = EditorView.theme({
            "&": {
                height: "100%",
                fontSize: "14.5px",
                fontFamily: "var(--font-mono, monospace)",
                backgroundColor: "transparent",
                color: "var(--text)"
            },
            ".cm-gutters": {
                backgroundColor: "var(--panel)",
                color: "var(--muted)",
                borderRight: "1px solid var(--border)",
                paddingLeft: "4px"
            },
            ".cm-scroller": {
                overflow: "auto"
            },
            ".cm-content": {
                padding: "16px 20px"
            },
            ".cm-activeLine": {
                backgroundColor: "rgba(128, 128, 128, 0.05)"
            },
            ".cm-activeLineGutter": {
                backgroundColor: "rgba(128, 128, 128, 0.1)"
            }
        });

        // Initialize CodeMirror 6 Editor
        const state = EditorState.create({
            doc: textarea.value,
            extensions: [
                basicSetup,
                markdown(),
                myTheme,
                EditorView.updateListener.of((update) => {
                    if (update.docChanged) {
                        const newDoc = update.state.doc.toString();
                        textarea.value = newDoc;
                        syncTitleFromEditor(newDoc);
                        queuePreview(250);
                    }
                })
            ]
        });

        const view = new EditorView({
            state,
            parent: editor.querySelector('#editor-container')
        });

        function syncTitleFromEditor(val) {
            const fmInfo = getTitleAndBody(val);
            if (fmInfo.title !== titleInput.value) {
                titleInput.value = fmInfo.title;
            }
        }

        function updateFrontmatterTitleInEditor(newTitle) {
            const currentDoc = view.state.doc.toString();
            const match = currentDoc.match(frontmatterRegex);
            if (match) {
                const fm = match[1];
                const titleMatch = fm.match(/^title:\s*(.*)$/m);
                if (titleMatch) {
                    const startIdx = match[0].indexOf(titleMatch[0]);
                    const from = startIdx;
                    const to = startIdx + titleMatch[0].length;
                    const insert = `title: "${newTitle.replace(/"/g, '\\"')}"`;
                    view.dispatch({
                        changes: { from, to, insert }
                    });
                } else {
                    const from = 4; // Right after "---\n"
                    view.dispatch({
                        changes: { from, to: from, insert: `title: "${newTitle.replace(/"/g, '\\"')}"\n` }
                    });
                }
            } else {
                const insert = `---\ntitle: "${newTitle.replace(/"/g, '\\"')}"\n---\n\n`;
                view.dispatch({
                    changes: { from: 0, to: 0, insert }
                });
            }
        }

        window.editorWrapSelection = function(marker, fallback) {
            const range = view.state.selection.main;
            const selectedText = view.state.doc.sliceString(range.from, range.to) || fallback;
            const insert = marker + selectedText + marker;
            view.dispatch({
                changes: { from: range.from, to: range.to, insert },
                selection: { anchor: range.from + marker.length, head: range.from + marker.length + selectedText.length }
            });
            view.focus();
        };

        window.editorPrefixLine = function(prefix) {
            const range = view.state.selection.main;
            const line = view.state.doc.lineAt(range.from);
            view.dispatch({
                changes: { from: line.from, to: line.from, insert: prefix }
            });
            view.focus();
        };

        function renderPreview() {
            const current = ++requestId;
            const body = new URLSearchParams();
            body.set('body', textarea.value);
            preview.dataset.state = 'loading';

            fetch('/preview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
                body: body
            })
                .then(function(response) {
                    if (!response.ok) throw new Error('Preview failed');
                    return response.text();
                })
                .then(function(html) {
                    if (current !== requestId) return;
                    preview.innerHTML = html || '<p><em>Blank page.</em></p>';
                    preview.dataset.state = 'ready';
                    if (window.Prism) window.Prism.highlightAllUnder(preview);
                })
                .catch(function() {
                    if (current !== requestId) return;
                    preview.innerHTML = '<p><em>Preview unavailable.</em></p>';
                    preview.dataset.state = 'error';
                });
        }

        function queuePreview(delay) {
            window.clearTimeout(timer);
            timer = window.setTimeout(renderPreview, delay);
        }

        if (titleInput) {
            titleInput.addEventListener('input', function() {
                updateFrontmatterTitleInEditor(titleInput.value);
            });

            titleInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    view.focus();
                } else if (e.key === 'Escape') {
                    const loadedHash = editor.querySelector('input[name="loaded_hash"]').value;
                    if (!loadedHash) {
                        e.preventDefault();
                        const cancelBtn = editor.querySelector('.mk-edit-actions .mk-btn-ghost');
                        if (cancelBtn) cancelBtn.click();
                    }
                }
            });

            // Initialize Title
            syncTitleFromEditor(textarea.value);
            const loadedHash = editor.querySelector('input[name="loaded_hash"]').value;
            if (!loadedHash) {
                if (!titleInput.value) {
                    const filename = "{{ path }}".split('/').pop() || "new note";
                    titleInput.value = filename;
                    updateFrontmatterTitleInEditor(filename);
                }
                titleInput.focus();
                titleInput.select();
            }
        }

        queuePreview(0);
    })();
</script>
{% endblock %}
