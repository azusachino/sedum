{% extends "base.html" %}

{% block title %}
Miku - Tags
{% endblock %}

{% block content %}
<main class="mk-page">
    <h1>Tags</h1>
    <p class="sub">{{ tags | length }} tags across your notes.</p>

    {% if tags %}
    <div class="mk-tagcloud">
        {% for t in tags %}
        <a href="/tags/{{ t.tag }}" class="mk-tagpill" style="{% if t.count >= 10 %}font-size: 18px; padding: 12px 16px;{% elif t.count >= 5 %}font-size: 16px; padding: 11px 15px;{% else %}font-size: 14px; padding: 10px 14px;{% endif %}">
            #{{ t.tag }} <span>{{ t.count }}</span>
        </a>
        {% endfor %}
    </div>
    {% else %}
    <p class="sub">No tags yet.</p>
    {% endif %}
</main>
{% endblock %}
