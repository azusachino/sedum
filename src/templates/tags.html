{% extends "base.html" %}

{% block title %}
Sedum - Tags
{% endblock %}

{% block content %}
<article>
    <h1>Tags</h1>

    <ul class="tag-list">
        {% for t in tags %}
        <li><a href="/tags/{{ t.tag }}" class="tag-link">#{{ t.tag }}</a> <span class="tag-count">{{ t.count }}</span></li>
        {% endfor %}
    </ul>
</article>
{% endblock %}
